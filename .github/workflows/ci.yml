name: CI - DEV/UAT

# ----------------------------------------------------------------------
# Purpose:
#   - Triggered when a PR is merged into `main`
#   - Deploys bundle to DEV
#   - Validates dbt against UAT warehouse before deploying to UAT
#   - Promotes to UAT after manual approval
# ----------------------------------------------------------------------

on:
  push:
    branches:
      - main

jobs:
  # ----------------------------
  # Step 1: Deploy to DEV
  # dbt already validated against dev in PR — no need to repeat
  # ----------------------------
  dev:
    uses: ./.github/workflows/dabs_template.yml
    with:
      environment: dev
      deploy: true
    secrets:
      ARM_CLIENT_ID: ${{ secrets.DEV_ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.DEV_ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

  # ----------------------------
  # Step 2: dbt validation (uat)
  # Validates against UAT warehouse before deploying
  # ----------------------------
  dbt-validate-uat:
    needs: dev
    uses: ./.github/workflows/dbt_validate_template.yml
    with:
      dbt_target: github_ci_uat
      dbt_env: uat
    secrets:
      ARM_CLIENT_ID: ${{ secrets.UAT_ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.UAT_ARM_CLIENT_SECRET }}

  # ----------------------------
  # Step 3: UAT approval gate
  # Pauses until reviewer approves
  # ----------------------------
  uat-approval:
    needs: dbt-validate-uat
    runs-on: ubuntu-latest
    environment: uat-approval
    steps:
      - run: echo "Approved for UAT deployment"

  # ----------------------------
  # Step 4: Deploy to UAT
  # Only runs after UAT approval and dbt validation passes
  # ----------------------------
  uat:
    needs: uat-approval
    uses: ./.github/workflows/dabs_template.yml
    with:
      environment: uat
      deploy: true
    secrets:
      ARM_CLIENT_ID: ${{ secrets.UAT_ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.UAT_ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
