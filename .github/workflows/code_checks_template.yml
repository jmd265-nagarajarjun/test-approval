name: Code Checks Template

# ----------------------------------------------------------------------
# Purpose:
#   - Reusable workflow for code quality checks
#   - Runs pre-commit hooks (SQLFluff, Ruff, trailing whitespace etc.)
#   - Validates commit message format (Conventional Commits via Commitizen)
#   - Only called from PR pipeline — no need to repeat in CI/CD
# ----------------------------------------------------------------------

on:
  workflow_call:
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_CLIENT_SECRET:
        required: true

jobs:
  code-checks:
    runs-on: ubuntu-latest

    env:
      DBT_TARGET: github_ci_dev
      DBT_ENV: dev
      DBT_USER: service_principal
      DATABRICKS_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

    steps:
      # --------------------------------------------------------------
      # Checkout source code
      # fetch-depth: 0 needed to access full commit history
      # for commit message validation
      # --------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # --------------------------------------------------------------
      # Setup Python
      # --------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # --------------------------------------------------------------
      # Run pre-commit hooks
      # Runs all hooks defined in .pre-commit-config.yaml
      # Covers SQLFluff, Ruff, trailing whitespace, yaml checks etc.
      # Note: commitizen commit-msg stage is not triggered here —
      # it is validated separately below
      # --------------------------------------------------------------
      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1
        env:
          SKIP: sqlfluff-fix

      # --------------------------------------------------------------
      # Validate commit messages (Commitizen)
      # Checks all commits in the PR follow Conventional Commits format
      # Runs separately since commitizen uses commit-msg stage
      # which pre-commit/action does not trigger
      # --------------------------------------------------------------
      - name: Install Commitizen
        run: pip install commitizen

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}
          cz check --rev-range origin/${{ github.base_ref }}..HEAD
