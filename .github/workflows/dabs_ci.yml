name: CI - DEV/UAT

# ----------------------------------------------------------------------
# Purpose:
#   - Triggered when a PR is merged into `main` for Databricks bundle changes
#   - Validates and deploys the bundle to DEV first
#   - If DEV deployment succeeds, automatically promotes bundle to UAT
# ----------------------------------------------------------------------

on:
  push:
    branches:
      - main

jobs:
  # ----------------------------
  # Step 1: DEV validation + deploy
  # ----------------------------
  dev:
    uses: ./.github/workflows/dabs_template.yml
    with:
      environment: dev
      deploy: true
    secrets:
      ARM_CLIENT_ID: ${{ secrets.DEV_ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.DEV_ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

  # ----------------------------
  # Step 2: UAT validation + deploy
  # ----------------------------
  # Approval gate for UAT
  uat-approval:
    needs: dev
    runs-on: ubuntu-latest
    environment: uat-approval
    steps:
      - run: echo "Approved for UAT deployment"

  # Deploy to UAT - only runs after approval
  uat:
    needs: uat-approval
    uses: ./.github/workflows/dabs_template.yml
    with:
      environment: uat
      deploy: true
    secrets:
      ARM_CLIENT_ID: ${{ secrets.UAT_ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.UAT_ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
