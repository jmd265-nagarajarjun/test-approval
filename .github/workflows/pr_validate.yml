name: PR - Validate

# ----------------------------------------------------------------------
# Purpose:
#   - Triggered on Pull Requests targeting the `main` branch
#   - Runs code quality checks (pre-commit hooks, commit message lint)
#   - Validates dbt project against dev environment
#   - Validates DABS bundle configuration for dev
# ----------------------------------------------------------------------

on:
  pull_request:
    branches:
      - main

jobs:
  # ----------------------------
  # Step 1: Code quality checks
  # Runs pre-commit hooks and commit message validation
  # ----------------------------
  code-checks:
    uses: ./.github/workflows/templates/code_checks.yml

  # ----------------------------
  # Step 2: dbt validation (dev)
  # Runs after code checks pass
  # ----------------------------
  dbt-validate:
    needs: code-checks
    uses: ./.github/workflows/templates/dbt_validate.yml
    with:
      dbt_target: github_ci_dev
      dbt_env: dev
    secrets:
      ARM_CLIENT_ID: ${{ secrets.DEV_ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.DEV_ARM_CLIENT_SECRET }}

  # ----------------------------
  # Step 3: DABS validation (dev)
  # Runs in parallel with dbt validation
  # ----------------------------
  dabs-validate:
    needs: code-checks
    uses: ./.github/workflows/templates/dabs.yml
    with:
      environment: dev
      deploy: false
    secrets:
      ARM_CLIENT_ID: ${{ secrets.DEV_ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.DEV_ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}