# ==============================================================
# Pipeline: CD Pipeline
# Purpose:
#   - Triggered automatically when a new tag is pushed
#   - Deploys Databricks Asset Bundle to PROD
#
# IMPORTANT:
#   The following Variable Group must exist in:
#   Azure DevOps → Pipelines → Library
#
#   1. PROD-Databricks-Secrets
#
#   Variable group must contain:
#     - ARM_CLIENT_ID       (secret)
#     - ARM_CLIENT_SECRET   (secret)
#
#   A shared variable group must also contain:
#     - ARM_TENANT_ID       (secret)
#
#   These are injected into the Databricks CLI via
#   environment variables inside the reusable template.
# ==============================================================


trigger:
  tags:
    include:
      - 'v*'   # Matches tags like v1.0.0

stages:

# ======================================================
# Stage - PROD Deployment
# ======================================================
- stage: PROD
  displayName: "Deploy to PROD"

  # Only run if CI succeeded
  condition: succeeded()

  variables:
  - group: PROD-Databricks-Secrets
  - group: ARM-Tenant

  jobs:
  - template: dabs_template.yml
    parameters:
      environment: prod
      environmentResource: prod-approval
      deploy: true
