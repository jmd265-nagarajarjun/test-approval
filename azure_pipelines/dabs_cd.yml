# ==============================================================
# Pipeline: CD Pipeline
# Purpose:
#   - Triggered automatically when a new tag is pushed
#   - Deploys Databricks Asset Bundle to PROD
#
# IMPORTANT:
#   The following Variable Group must exist in:
#   Azure DevOps → Pipelines → Library
#
#   1. PROD-Databricks-Secrets
#
#   Variable group must contain:
#     - ARM_CLIENT_ID       (secret)
#     - ARM_CLIENT_SECRET   (secret)
#
#   A shared variable group must also contain:
#     - ARM_TENANT_ID       (secret)
#
#   These are injected into the Databricks CLI via
#   environment variables inside the reusable template.
# ==============================================================


trigger:
  tags:
    include:
      - 'v*'   # Matches tags like v1.0.0

stages:

# ======================================================
# Stage - Validate PROD Bundle
# ======================================================
- stage: VALIDATE_PROD
  displayName: "Validate PROD"
  condition: succeeded()

  variables:
  - group: PROD-Databricks-Secrets
  - group: ARM-Tenant

  jobs:
  - template: dabs_template.yml
    parameters:
      environment: prod
      deploy: false
      armClientId: $(PROD_ARM_CLIENT_ID)
      armClientSecret: $(PROD_ARM_CLIENT_SECRET)

# ======================================================
# Stage - Approval Gate for PROD Deployment
# ======================================================
- stage: PROD_APPROVAL
  displayName: "Approve PROD deployment"
  dependsOn: VALIDATE_PROD
  condition: succeeded('VALIDATE_PROD')

  jobs:
  - deployment: Approval
    displayName: "Wait for PROD approval"
    environment: prod-approval
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Approved for PROD deployment"

# ======================================================
# Stage - PROD Deployment
# ======================================================
- stage: PROD_DEPLOY
  displayName: "Deploy to PROD"
  dependsOn: PROD_APPROVAL
  condition: succeeded('PROD_APPROVAL')

  variables:
  - group: PROD-Databricks-Secrets
  - group: ARM-Tenant

  jobs:
  - template: dabs_template.yml
    parameters:
      environment: prod
      deploy: true
      armClientId: $(PROD_ARM_CLIENT_ID)
      armClientSecret: $(PROD_ARM_CLIENT_SECRET)
