# ==============================================================
# Pipeline: CI - DEV/UAT
# Purpose:
#   - Triggered when changes are pushed to main
#   - Runs only if Databricks bundle changes
#   - Deploys to DEV first
#   - If DEV succeeds, promotes to UAT
#
# IMPORTANT:
#   The following Variable Groups must exist in:
#   Azure DevOps → Pipelines → Library
#
#   1. DEV-Databricks-Secrets
#   2. UAT-Databricks-Secrets
#
#   Each variable group must contain:
#     - ARM_CLIENT_ID       (secret)
#     - ARM_CLIENT_SECRET   (secret)
#
#   A shared variable group must also contain:
#     - ARM_TENANT_ID       (secret)
#
#   These are injected into the Databricks CLI via
#   environment variables inside the reusable template.
# ==============================================================

trigger:
  branches:
    include:
      - main


stages:

# ======================================================
# Stage 1 - DEV
# ======================================================
- stage: DEV
  displayName: "Deploy to DEV"

  variables:
  - group: DEV-Databricks-Secrets   # Variable group with DEV secrets
  - group: ARM-Tenant

  jobs:
  - template: dabs_template.yml
    parameters:
      environment: dev
      deploy: true
      armClientId: $(DEV_ARM_CLIENT_ID)
      armClientSecret: $(DEV_ARM_CLIENT_SECRET)



# ======================================================
# Stage 2 - UAT
# Runs only if DEV succeeds (equivalent of needs: dev)
# ======================================================
- stage: UAT
  displayName: "Deploy to UAT"
  dependsOn: DEV
  condition: succeeded()

  variables:
  - group: UAT-Databricks-Secrets   # Variable group with UAT secrets
  - group: ARM-Tenant

  jobs:
  - template: dabs_template.yml
    parameters:
      environment: uat
      environmentResource: uat-approval
      deploy: true
      armClientId: $(UAT_ARM_CLIENT_ID)
      armClientSecret: $(UAT_ARM_CLIENT_SECRET)
