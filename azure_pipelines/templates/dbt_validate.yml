# ==============================================================
# Template: dbt_validate_template.yml
# Purpose:
#   - Reusable template for dbt project validation
#   - Runs dbt deps, parse, and compile against the target environment
#   - Called from PR, CI, and CD pipelines with different targets:
#       PR check  → github_ci_dev  (validates against dev warehouse)
#       CI (UAT)  → github_ci_uat  (validates against uat warehouse)
#       CD (prod) → github_ci_prod (validates against prod warehouse)
# ==============================================================

parameters:
  - name: dbtTarget
    type: string

  - name: dbtEnv
    type: string

  - name: armClientId
    type: string

  - name: armClientSecret
    type: string

jobs:
  - job: dbt_validate
    displayName: "dbt Validate (${{ parameters.dbtEnv }})"
    pool:
      vmImage: 'ubuntu-latest'

    variables:
      DBT_TARGET: ${{ parameters.dbtTarget }}
      DBT_ENV: ${{ parameters.dbtEnv }}
      DBT_USER: service_principal
      DATABRICKS_CLIENT_ID: ${{ parameters.armClientId }}
      DATABRICKS_CLIENT_SECRET: ${{ parameters.armClientSecret }}
      DBT_PROJECT_DIR: src/02_transform/dbt_core
      DBT_PROFILES_DIR: src/02_transform/dbt_core/.dbt

    steps:
      # --------------------------------------------------------------
      # Checkout source code
      # --------------------------------------------------------------
      - checkout: self

      # --------------------------------------------------------------
      # Setup Python
      # --------------------------------------------------------------
      - task: UsePythonVersion@0
        displayName: "Setup Python"
        inputs:
          versionSpec: '3.11'

      # --------------------------------------------------------------
      # Install dbt
      # Pinned to same versions as the Databricks job to ensure
      # consistent behaviour between CI validation and job execution
      # --------------------------------------------------------------
      - script: |
          pip install \
            dbt-core==1.11.11 \
            dbt-databricks==1.12.1
        displayName: "Install dbt"

      # --------------------------------------------------------------
      # dbt deps
      # Installs packages defined in packages.yml
      # --------------------------------------------------------------
      - script: dbt deps
        displayName: "dbt deps"

      # --------------------------------------------------------------
      # dbt compile
      # Resolves all refs and compiles SQL against the target warehouse
      # Catches environment-specific catalog and schema issues
      # --------------------------------------------------------------
      - script: dbt compile --target $(DBT_TARGET)
        displayName: "dbt compile"
