variables:
  transformation_warehouse_type:
    default: CLASSIC
  transformation_enable_serverless_compute:
    default: false
resources:
  sql_warehouses:
    transformation:
      name: transformation_wh
      warehouse_type: ${var.transformation_warehouse_type}
      enable_serverless_compute: ${var.transformation_enable_serverless_compute}
      cluster_size: Small
      min_num_clusters: 1
      max_num_clusters: 2
      auto_stop_mins: 25
      spot_instance_policy: COST_OPTIMIZED
      tags:
        custom_tags:
        - key: Environment
          value: ${bundle.target}
        - key: Bundle
          value: ${bundle.name}
        - key: Provisioned By
          value: DABS
      permissions:
      - user_name: nagarajarjun@jmangroup.com
        level: CAN_MANAGE
