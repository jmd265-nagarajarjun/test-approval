# All-Purpose Cluster for Ingestion / Transformation
#
# Purpose:
#   - Provides a shared interactive cluster focused on Python workloads
#   - Suitable for Python-based ingestion, development, and testing

# Reference:
#   https://learn.microsoft.com/en-us/azure/databricks/dev-tools/bundles/resources#clusters

resources:
  clusters:
    {{name}}:

      # ------------------------------
      # Cluster Identity & Policy
      # ------------------------------
      cluster_name: {{name}}

      # ------------------------------
      # Runtime & Compute Configuration
      # ------------------------------
      spark_version: {{spark_version}}
      runtime_engine: {{runtime_engine}}

      node_type_id: {{node_type_id}}
      driver_node_type_id: {{driver_node_type_id}}

      autoscale:
        min_workers: {{min_workers}}
        max_workers: {{max_workers}}

      autotermination_minutes: {{autotermination_minutes}}

      # ------------------------------
      # Security & Governance
      # ------------------------------
      data_security_mode: USER_ISOLATION
      apply_policy_default_values: true  # Apply policy defaults for unspecified fields

      # ------------------------------
      # Metadata / Tags
      # ------------------------------
      custom_tags:
        Environment: "${bundle.target}"
        Bundle: "${bundle.name}"
        "Provisioned By": "DABS"

      # ------------------------------
      # Permissions (Access Control)
      # ------------------------------
      # Prefer group-based access. Use user-level permissions only for exceptions.
      {% if permissions is defined %}
      permissions:
      {% for group in permissions.groups %}
        - group_name: "{{ group.group_name }}"
          level: "{{ group.level }}"
      {% endfor %}

      {% for user in permissions.users %}
        - user_name: "{{ user.user_name }}"
          level: "{{ user.level }}"
      {% endfor %}

      {% for service_principal in permissions.service_principals %}
        - service_principal_name: "{{ service_principal.service_principal_name }}"
          level: "{{ service_principal.level }}"
      {% endfor %}
      {% endif %}
      # permissions:
      #   - group_name: ""   # Databricks group name
      #     level: ""        # CAN_ATTACH_TO | CAN_RESTART | CAN_MANAGE

      #   - user_name: ""    # Databricks user email (e.g. user@company.com)
      #     level: ""        # CAN_ATTACH_TO | CAN_RESTART | CAN_MANAGE
