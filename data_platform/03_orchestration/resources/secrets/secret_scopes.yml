# ==============================================================================
# Secret Scope Resource Definitions
# ==============================================================================
#
# One Azure Key Vault-backed secret scope is created per environment.
# The scope name is automatically prefixed with the environment name:
#   e.g. dev_kv_secret_scope | uat_kv_secret_scope | prod_kv_secret_scope
#
# Key Vault details and permissions are defined per target in databricks.yml
# ==============================================================================

resources:
  secret_scopes:
    kv_secret_scope:
      name: ${bundle.target}_kv_secret_scope
      backend_type: AZURE_KEYVAULT
      keyvault_metadata:
        resource_id: ${var.keyvault_resource_id}
        dns_name: ${var.keyvault_dns_name}
      permissions: ${var.secret_scope_permissions}