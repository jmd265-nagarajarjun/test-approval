# Refer to the Databricks Resource Provisioning Runbook before making changes.
# docs/databricks-resource-provisioning-runbook.md

sql_wh:
  - name: "bi"
    cluster_size: "Small"
    min_num_clusters: 1
    max_num_clusters: 4
    auto_stop_mins: 25
    warehouse_type: "PRO"
    enable_serverless_compute: true
    permissions:
      groups:
        - group_name: "dsk_data_engineers"
          level: CAN_USE
      users:
        - user_name: "nagarajarjun@jmangroup.com"
          level: CAN_MANAGE
      service_principals:
        - service_principal_name: "067808d3-d3f7-42c5-b671-f070affe3086"
          level: CAN_USE

  - name: "analytics"
    cluster_size: "X-Small"
    min_num_clusters: 1
    max_num_clusters: 1
    auto_stop_mins: 25
    warehouse_type: "PRO"
    enable_serverless_compute: true
    permissions:
      groups:
        - group_name: "dsk_data_engineers"
          level: CAN_USE
      users:
        - user_name: "nagarajarjun@jmangroup.com"
          level: CAN_MANAGE

transformation_sql_wh:
  - name: "transformation"
    cluster_size: "Small"
    min_num_clusters: 1
    max_num_clusters: 2
    auto_stop_mins: 25
    warehouse_type: "CLASSIC"
    enable_serverless_compute: false
    permissions:
      groups:
        - group_name: "dsk_data_engineers"
          level: CAN_USE
      users:
        - user_name: "nagarajarjun@jmangroup.com"
          level: CAN_MANAGE

all_purpose_cluster:
  - name: "development"
    spark_version: "16.4.x-scala2.12"
    runtime_engine: "PHOTON"
    node_type_id: "Standard_D4s_v5"
    driver_node_type_id: "Standard_D4s_v5"
    min_workers: 1
    max_workers: 4
    autotermination_minutes: 25
    permissions:
      groups:
        - group_name: "dsk_data_engineers"
          level: CAN_ATTACH_TO
      users:
        - user_name: "nagarajarjun@jmangroup.com"
          level: CAN_MANAGE

