# ==============================================================================
# SQL Warehouse Resource Definitions
# ==============================================================================
#
# HOW TO USE:
#   1. Choose the right template for your warehouse:
#        - Serverless  →  use  <<: *wh_serverless
#        - Standard    →  use  <<: *wh_standard     (CLASSIC or PRO Warehouse)
#
#   2. Add a new block under resources.sql_warehouses
#   3. Fill in only the required fields (marked REQUIRED below)
#   4. Override optional fields only if the defaults don't suit you
#
# TAGS & PERMISSIONS are defined once in databricks.yml and flow in via variables
# ==============================================================================


# ------------------------------------------------------------------------------
# TEMPLATE: Serverless Warehouse
# Auto-stop is 10 mins — serverless spins up in seconds, no need to keep warm
# ------------------------------------------------------------------------------
_wh_serverless: &wh_serverless
  warehouse_type: PRO
  enable_serverless_compute: true
  auto_stop_mins: 10
  min_num_clusters: 1
  spot_instance_policy: COST_OPTIMIZED
  tags: ${var.warehouse_tags}
  permissions: ${var.warehouse_permissions}

  # --- Per-instance fields (fill these in when adding a new warehouse) ---
  # name:             REQUIRED  — display name in the Databricks UI
  # cluster_size:     REQUIRED  — X-Small | Small | Medium | Large | X-Large
  # max_num_clusters: 1         — increase if you need scale-out


# ------------------------------------------------------------------------------
# TEMPLATE: Standard Warehouse  (CLASSIC or PRO non-serverless)
# Auto-stop is 25 mins — takes ~4 mins to start, worth keeping warm longer
# ------------------------------------------------------------------------------
_wh_standard: &wh_standard
  warehouse_type: CLASSIC         # override to PRO per-instance if needed
  enable_serverless_compute: false
  auto_stop_mins: 25
  min_num_clusters: 1
  spot_instance_policy: COST_OPTIMIZED
  tags: ${var.warehouse_tags}
  permissions: ${var.warehouse_permissions}

  # --- Per-instance fields (fill these in when adding a new warehouse) ---
  # name:             REQUIRED  — display name in the Databricks UI
  # cluster_size:     REQUIRED  — X-Small | Small | Medium | Large | X-Large
  # max_num_clusters: 1         — increase if you need scale-out
  # warehouse_type:   CLASSIC   — override to PRO if you want PRO non-serverless


# ==============================================================================
# WAREHOUSE INSTANCES
# Add your warehouses below. Each one merges a template and overrides specifics.
# ==============================================================================

resources:
  sql_warehouses:

    # --------------------------------------------------------------------------
    # Ingestion Warehouse — Serverless, scales up to 3 clusters
    # --------------------------------------------------------------------------
    ingestion:
      <<: *wh_serverless
      name: ingestion_wh
      cluster_size: Small
      max_num_clusters: 3

    # --------------------------------------------------------------------------
    # Analytics Warehouse — Serverless, scales up to 4 clusters
    # --------------------------------------------------------------------------
    analytics:
      <<: *wh_serverless
      name: analytics_wh
      cluster_size: X-Small
      max_num_clusters: 4

    # --------------------------------------------------------------------------
    # BI Warehouse — Serverless, scales up to 3 clusters
    # --------------------------------------------------------------------------
    bi:
      <<: *wh_serverless
      name: bi_wh
      cluster_size: Small
      max_num_clusters: 3

    # --------------------------------------------------------------------------
    # Transformation Warehouse — type is env-driven via variables in databricks.yml
    # CLASSIC in dev, PRO + serverless in uat/prod
    # --------------------------------------------------------------------------
    transform:
      <<: *wh_standard
      name: transform_wh
      cluster_size: Small
      max_num_clusters: 3
      warehouse_type: ${var.transformation_warehouse_type}
      enable_serverless_compute: ${var.transformation_enable_serverless_compute}
