resources:
  jobs:

    dbt_job:

      # ----------------------------------------------------------------------
      # Job name — prefixed with environment name automatically via DABs presets
      # e.g. dev_dbt_job | uat_dbt_job | prod_dbt_job
      # ----------------------------------------------------------------------
      name: dbt_job
      description: >-
        Runs the dbt Core project transformation layer — executes dbt deps and dbt build
        to refresh all models across all the data layers.
        Triggered on a schedule for uat and prod, paused by default for dev-local and dev.
        Use the dbt_run_string parameter to target specific models when triggering manually.

      # ----------------------------------------------------------------------
      # Schedule
      # PAUSED by default for dev-local and dev — set to UNPAUSED for uat and
      # prod via schedule_pause_status variable in databricks.yml
      #
      # Cron syntax: second minute hour day-of-month month day-of-week year
      # Examples:
      #   "0 0 6 * * ?"       — every day at 6:00 AM UTC
      #   "0 0 6 ? * MON-FRI" — weekdays at 6:00 AM UTC
      #   "0 0 */6 * * ?"     — every 6 hours
      # ----------------------------------------------------------------------
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "UTC"
        pause_status: ${var.schedule_pause_status}

      # ----------------------------------------------------------------------
      # Email Notifications
      # Empty by default for dev-local and dev.
      # Set notification_emails in databricks.yml for uat and prod.
      # ----------------------------------------------------------------------
      email_notifications:
        on_failure: ${var.notification_emails}

      # ----------------------------------------------------------------------
      # Job Cluster
      # Uses the shared cluster spec defined in _job_variables.yml.
      # ----------------------------------------------------------------------
      job_clusters: ${var.job_cluster}

      # ----------------------------------------------------------------------
      # Tasks
      # ----------------------------------------------------------------------
      tasks:
        - task_key: dbt_refresh
          job_cluster_key: job_cluster
          libraries:
            - pypi:
                package: dbt-core==1.11.11
            - pypi:
                package: dbt-databricks==1.12.1
          dbt_task:
            project_directory: ../../../02_transform/dbt_core/
            profiles_directory: .dbt
            commands:
              - dbt deps
              - dbt build {{job.parameters.dbt_run_string}}

      # ----------------------------------------------------------------------
      # Job Parameters
      # dbt_run_string — controls which models dbt builds.
      # Defaults to empty which runs all models.
      #
      # Override when triggering manually to target specific models:
      #   --select reporting.my_table+        — run a specific model and its downstream
      #   --select +reporting.my_table+       — run upstream, the model, and downstream
      #   --select tag:daily                  — run all models tagged as daily
      #   --exclude reporting.my_table        — run everything except a specific model
      # ----------------------------------------------------------------------
      parameters:
        - name: dbt_run_string
          default: ""

      queue:
        enabled: true

      permissions: ${var.job_permissions}