# ==============================================================================
# Job Variables
# ==============================================================================
#
# Job cluster configuration defined once and used across all jobs.
# Every job in this project references this variable for its cluster spec —
# each job run spins up its own isolated cluster instance from this definition.
# ==============================================================================

variables:

  job_cluster:
    description: Job cluster configuration shared across all jobs
    type: complex
    default:
      - job_cluster_key: job_cluster
        new_cluster:
          spark_version: 16.4.x-scala2.12
          node_type_id: Standard_D4s_v5
          runtime_engine: PHOTON
          data_security_mode: USER_ISOLATION
          autoscale:
            min_workers: 1
            max_workers: 3
          spark_env_vars:
            DBT_TARGET: ${var.dbt_target}
            DBT_ENV: ${var.dbt_env}
            DBT_USER: ${var.dbt_user}